name: cargo-audit

on:
  # v0.51.0: run on every PR (blocking) and weekly for maintenance.
  pull_request:
    branches: [main]
  schedule:
    # Run weekly on Monday at 08:00 UTC
    - cron: '0 8 * * 1'
  workflow_dispatch: {}

jobs:
  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: cargo-audit-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-audit-

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run cargo audit
        run: cargo audit --deny warnings

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Security: cargo audit found vulnerabilities (${new Date().toISOString().split('T')[0]})`;
            const body = `## cargo audit failure\n\nThe weekly \`cargo audit\` job failed.\n\n` +
              `[View run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})\n\n` +
              `Please triage the advisory and update \`Cargo.toml\` or add an \`[advisories]\` ignore entry in \`deny.toml\`.`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['security', 'dependencies'],
            });

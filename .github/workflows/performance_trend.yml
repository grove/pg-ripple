name: Performance Trend

# v0.67.0 BENCH-02: Weekly scheduled performance trend workflow.
# Runs BSBM-like benchmarks, appends results to CSV history files, and
# fails the run if any metric regresses more than 10% vs. the rolling
# 4-week average (or the p95 baselines where available).

on:
  schedule:
    # Run every Monday at 03:00 UTC (off-peak; avoids GH Actions congestion).
    - cron: "0 3 * * 1"
  workflow_dispatch:
    inputs:
      run_reason:
        description: "Reason for manual trigger (optional)"
        required: false
        default: "manual"

concurrency:
  group: perf-trend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  performance-trend:
    name: Performance Trend (pg18)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    services:
      postgres:
        # We start PG via pgrx below, not as a service, but keep this
        # placeholder to document that no external service is needed.
        image: ""
        options: "--health-cmd echo --health-interval 1s --health-timeout 1s --health-retries 1"

    env:
      PGHOST: localhost
      PGPORT: 28818
      PGUSER: runner
      PGDATABASE: postgres

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4
        with:
          # Fetch full history so we can append and diff CSV files.
          fetch-depth: 0

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libssl-dev pkg-config postgresql-client python3

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684  # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin/cargo-pgrx
          key: ${{ runner.os }}-cargo-pgrx-${{ hashFiles('rust-toolchain.toml', 'Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-pgrx-

      - name: Install cargo-pgrx
        run: |
          if ! command -v cargo-pgrx &>/dev/null; then
            cargo install cargo-pgrx --locked
          fi

      - name: Initialize pgrx for PostgreSQL 18
        run: cargo pgrx init --pg18 download

      - name: Build extension
        run: cargo pgrx install --pg-config ~/.pgrx/18.*/pgrx-install/bin/pg_config

      - name: Start pgrx PostgreSQL 18
        run: cargo pgrx start pg18

      - name: Install extension and baseline data
        run: |
          PGHOST=localhost PGPORT=28818 PGUSER="$USER" PGDATABASE=postgres \
            psql -c "CREATE EXTENSION IF NOT EXISTS pg_ripple;"

      # ── Insert throughput ────────────────────────────────────────────────────
      - name: Benchmark — insert throughput
        id: bench_insert
        run: |
          PGHOST=localhost PGPORT=28818 PGUSER="$USER" PGDATABASE=postgres \
            pgbench -f benchmarks/insert_throughput.sql -t 1 \
            | tee insert_throughput_raw.txt

      # ── Merge throughput ─────────────────────────────────────────────────────
      - name: Benchmark — merge throughput
        id: bench_merge
        run: |
          PGHOST=localhost PGPORT=28818 PGUSER="$USER" PGDATABASE=postgres \
            pgbench -f benchmarks/merge_throughput.sql -t 1 \
            | tee merge_throughput_raw.txt

      # ── SPARQL hybrid search ─────────────────────────────────────────────────
      - name: Benchmark — hybrid search
        id: bench_hybrid
        run: |
          PGHOST=localhost PGPORT=28818 PGUSER="$USER" PGDATABASE=postgres \
            pgbench -f benchmarks/hybrid_search.sql -t 1 \
            | tee hybrid_search_raw.txt

      # ── Append results to CSV history ───────────────────────────────────────
      - name: Append results to CSV trend files
        run: |
          DATE=$(date -u +%Y-%m-%d)
          WEEK=$(date -u +%Y-W%V)

          python3 - <<'PYEOF'
import re, pathlib, datetime, os

date_str = os.environ.get("DATE", datetime.date.today().isoformat())
week_str = os.environ.get("WEEK", f"{datetime.date.today().isocalendar()[0]}-W{datetime.date.today().isocalendar()[1]:02d}")

csv_dir = pathlib.Path("benchmarks")

def extract_tps(raw_path: str) -> float | None:
    """Extract tps from pgbench output."""
    try:
        text = pathlib.Path(raw_path).read_text()
    except FileNotFoundError:
        return None
    m = re.search(r"tps\s*=\s*([\d.]+)", text)
    return float(m.group(1)) if m else None

def extract_workers_throughput(raw_path: str) -> dict[str, int]:
    try:
        text = pathlib.Path(raw_path).read_text()
    except FileNotFoundError:
        return {}
    results = {}
    for m in re.finditer(r"workers=(\d+)\s+throughput=(\d+)", text):
        results[m.group(1)] = int(m.group(2))
    return results

# Insert throughput
insert_tps = extract_tps("insert_throughput_raw.txt")
if insert_tps is not None:
    hist = csv_dir / "insert_throughput_history.csv"
    if not hist.exists():
        hist.write_text("date,week,tps\n")
    with hist.open("a") as f:
        f.write(f"{date_str},{week_str},{insert_tps:.1f}\n")
    print(f"Insert TPS: {insert_tps:.1f}")

# Merge throughput
merge_results = extract_workers_throughput("merge_throughput_raw.txt")
for workers, tp in merge_results.items():
    hist = csv_dir / "merge_throughput_history.csv"
    if not hist.exists():
        hist.write_text("date,week,workers,throughput\n")
    with hist.open("a") as f:
        f.write(f"{date_str},{week_str},{workers},{tp}\n")
    print(f"Merge workers={workers} throughput={tp}")

# Hybrid search
hybrid_tps = extract_tps("hybrid_search_raw.txt")
if hybrid_tps is not None:
    hist = csv_dir / "hybrid_search_history.csv"
    if not hist.exists():
        hist.write_text("date,week,tps\n")
    with hist.open("a") as f:
        f.write(f"{date_str},{week_str},{hybrid_tps:.1f}\n")
    print(f"Hybrid search TPS: {hybrid_tps:.1f}")
PYEOF

      # ── Regression gate against rolling 4-week average ──────────────────────
      - name: Regression gate (4-week rolling average)
        run: |
          python3 - <<'PYEOF'
import re, sys, pathlib, statistics

REGRESS_THRESHOLD = 0.10   # 10% drop triggers failure
WARMUP_WEEKS = 4           # minimum history weeks before gate is active
failed = False

def check_regression(name: str, csv_path: str, value_col: int) -> None:
    global failed
    hist = pathlib.Path(csv_path)
    if not hist.exists():
        print(f"SKIP {name}: no history file yet")
        return
    rows = []
    for line in hist.read_text().splitlines()[1:]:  # skip header
        parts = line.strip().split(",")
        if len(parts) > value_col:
            try:
                rows.append(float(parts[value_col]))
            except ValueError:
                pass
    if len(rows) < WARMUP_WEEKS + 1:
        print(f"SKIP {name}: only {len(rows)} data points (need ≥{WARMUP_WEEKS+1})")
        return
    recent = rows[-1]
    baseline = statistics.mean(rows[-WARMUP_WEEKS-1:-1])
    ratio = recent / baseline if baseline > 0 else 1.0
    drop = 1.0 - ratio
    if drop > REGRESS_THRESHOLD:
        print(f"FAIL {name}: {recent:.1f} is {drop*100:.1f}% below 4-week avg {baseline:.1f}")
        failed = True
    else:
        print(f"PASS {name}: {recent:.1f} vs 4-week avg {baseline:.1f} ({ratio*100:.1f}%)")

check_regression("insert_throughput", "benchmarks/insert_throughput_history.csv", 2)
check_regression("merge_throughput(workers=1)", "benchmarks/merge_throughput_history.csv", 3)
check_regression("hybrid_search", "benchmarks/hybrid_search_history.csv", 2)

sys.exit(1 if failed else 0)
PYEOF

      # ── Commit updated CSV files back to the repository ─────────────────────
      - name: Commit performance trend data
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add benchmarks/*_history.csv || true
          if git diff --cached --quiet; then
            echo "No new data to commit"
          else
            git commit -m "chore: append weekly performance trend data [skip ci]"
            git push
          fi

      - name: Upload raw benchmark outputs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: perf-trend-${{ github.run_id }}
          path: |
            insert_throughput_raw.txt
            merge_throughput_raw.txt
            hybrid_search_raw.txt
            benchmarks/*_history.csv
          retention-days: 90

      - name: Stop pgrx PostgreSQL 18
        if: always()
        run: cargo pgrx stop pg18 2>/dev/null || true

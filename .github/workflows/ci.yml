name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test (pg18)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            pkg-config \
            libssl-dev \
            libclang-dev \
            clang \
            libreadline-dev \
            libicu-dev \
            bison \
            flex

      - name: Install cargo-pgrx
        run: cargo install cargo-pgrx --version "=0.17.0" --locked

      - name: Initialise pgrx (PostgreSQL 18)
        run: cargo pgrx init --pg18 download

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --features pg18 -- -D warnings

      - name: Run pg_test suite
        run: cargo pgrx test pg18

  regress:
    name: pg_regress (pg18)
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config libssl-dev libclang-dev clang \
            libreadline-dev libicu-dev bison flex

      - name: Install cargo-pgrx
        run: cargo install cargo-pgrx --version "=0.17.0" --locked

      - name: Initialise pgrx (PostgreSQL 18)
        run: cargo pgrx init --pg18 download

      - name: Run pg_regress suite
        run: cargo pgrx regress pg18 --postgresql-conf "allow_system_table_mods=on"

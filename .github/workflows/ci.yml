  citus-integration:
    name: Citus integration tests (v0.75.0 CI-INTEGRATION-01)
    needs: [test, regress]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4

      - name: Install system dependencies
        run: |

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  PGRX_VERSION: "0.17.0"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Test (pg18)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Clean stale pgrx test data
        run: rm -rf target/test-pgdata

      - name: Cache cargo-pgrx binary
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin/cargo-pgrx
          key: ${{ runner.os }}-cargo-pgrx-${{ env.PGRX_VERSION }}

      - name: Cache pgrx PostgreSQL build
        uses: actions/cache@v5
        with:
          path: ~/.pgrx
          key: ${{ runner.os }}-pgrx-pg18-${{ env.PGRX_VERSION }}

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            pkg-config \
            libssl-dev \
            libclang-dev \
            clang \
            lld \
            libreadline-dev \
            libicu-dev \
            bison \
            flex

      - name: Install cargo-pgrx
        run: |
          if ! cargo pgrx --version 2>/dev/null | grep -q "${{ env.PGRX_VERSION }}"; then
            cargo install cargo-pgrx --version "=${{ env.PGRX_VERSION }}" --locked
          fi

      - name: Initialise pgrx (PostgreSQL 18)
        run: |
          if ! ls ~/.pgrx/18.*/pgrx-install/bin/pg_config 2>/dev/null | grep -q .; then
            cargo pgrx init --pg18 download
          fi

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --features pg18 -- -D warnings

      - name: Run pg_test suite
        env:
          RUST_TEST_THREADS: "1"
        run: cargo pgrx test pg18

  regress:
    name: pg_regress (pg18)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Cache cargo-pgrx binary
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin/cargo-pgrx
          key: ${{ runner.os }}-cargo-pgrx-${{ env.PGRX_VERSION }}

      - name: Cache pgrx PostgreSQL build
        uses: actions/cache@v5
        with:
          path: ~/.pgrx
          key: ${{ runner.os }}-pgrx-pg18-${{ env.PGRX_VERSION }}

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config libssl-dev libclang-dev clang lld \
            libreadline-dev libicu-dev bison flex

      - name: Install cargo-pgrx
        run: |
          if ! cargo pgrx --version 2>/dev/null | grep -q "${{ env.PGRX_VERSION }}"; then
            cargo install cargo-pgrx --version "=${{ env.PGRX_VERSION }}" --locked
          fi

      - name: Initialise pgrx (PostgreSQL 18)
        run: |
          if ! ls ~/.pgrx/18.*/pgrx-install/bin/pg_config 2>/dev/null | grep -q .; then
            cargo pgrx init --pg18 download
          fi

      - name: Run pg_regress suite
        run: cargo pgrx regress pg18 --postgresql-conf "allow_system_table_mods=on"

      - name: Upload regression results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pg_regress_results
          path: |
            tests/pg_regress/regression.diffs
            tests/pg_regress/regression.out
            tests/pg_regress/results/
          if-no-files-found: ignore


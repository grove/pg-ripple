name: Benchmark

on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  PGRX_VERSION: "0.18.0"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  benchmark:
    name: Performance baseline (pg18)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable

      - name: Cache Cargo registry
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Cache cargo-pgrx binary
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5
        with:
          path: ~/.cargo/bin/cargo-pgrx
          key: ${{ runner.os }}-cargo-pgrx-${{ env.PGRX_VERSION }}

      - name: Install PostgreSQL 18 from PGDG
        run: |
          sudo apt-get install -y --no-install-recommends curl ca-certificates lsb-release
          sudo install -d /usr/share/postgresql-common/pgdg
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc \
            | sudo tee /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc >/dev/null
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config libssl-dev libclang-dev clang lld \
            postgresql-18 postgresql-server-dev-18
          sudo chown -R "$USER" \
            /usr/share/postgresql/18/extension \
            /usr/lib/postgresql/18/lib

      - name: Install cargo-pgrx
        run: |
          if ! cargo pgrx --version 2>/dev/null | grep -q "${{ env.PGRX_VERSION }}"; then
            cargo install cargo-pgrx --version "=${{ env.PGRX_VERSION }}" --locked
          fi

      - name: Initialise pgrx (PostgreSQL 18)
        run: cargo pgrx init --pg18 /usr/lib/postgresql/18/bin/pg_config

      - name: Clean stale pgrx data
        run: |
          cargo pgrx stop pg18 2>/dev/null || true
          rm -rf ~/.pgrx/data-18

      - name: Start pgrx PostgreSQL 18
        run: cargo pgrx start pg18 --postgresql-conf "allow_system_table_mods=on"

      - name: Build extension
        run: cargo pgrx install --pg-config /usr/lib/postgresql/18/bin/pg_config --release

      - name: Create extension in database
        run: |
          psql -h localhost -p 28818 -U "$USER" -d postgres -c "CREATE EXTENSION pg_ripple;"

      - name: Run benchmark
        run: |
          PGHOST=localhost PGPORT=28818 PGUSER="$USER" PGDATABASE=postgres \
            RESULT_FILE=benchmark_results.json \
            bash benchmarks/ci_benchmark.sh

      # F-5 (v0.55.0): Merge throughput baseline gate — fails if merge rate
      # drops below the p95 floor recorded in merge_throughput_baselines.json.
      - name: Run merge throughput benchmark (F-5)
        run: |
          PGHOST=localhost PGPORT=28818 PGUSER="$USER" PGDATABASE=postgres \
            bash benchmarks/merge_throughput.sql | tee merge_throughput_raw.txt || true
          python3 - <<'PYEOF'
          import json, sys, re, pathlib
          baselines = json.loads(pathlib.Path("benchmarks/merge_throughput_baselines.json").read_text())
          raw = pathlib.Path("merge_throughput_raw.txt").read_text()
          # parse lines like: workers=1 throughput=500000
          results = {}
          for line in raw.splitlines():
              m = re.search(r"workers=(\d+)\s+throughput=(\d+)", line)
              if m:
                  results[m.group(1)] = int(m.group(2))
          if not results:
              print("No merge throughput results found — skipping gate")
              sys.exit(0)
          failed = False
          for workers, measured in results.items():
              b = baselines.get("merge_workers", {}).get(workers)
              if not b:
                  continue
              floor = int(b.get("p95", 0))
              if measured < floor:
                  print(f"FAIL workers={workers}: {measured} < p95 floor {floor} triples/s")
                  failed = True
              else:
                  print(f"PASS workers={workers}: {measured} >= p95 floor {floor} triples/s")
          sys.exit(1 if failed else 0)
          PYEOF

      # F-6 (v0.55.0): Vector index build/recall baseline gate.
      - name: Run vector index baseline benchmark (F-6)
        run: |
          PGHOST=localhost PGPORT=28818 PGUSER="$USER" PGDATABASE=postgres \
            psql -d postgres -f benchmarks/vector_index_compare.sql \
            | tee vector_bench_raw.txt || true
          python3 - <<'PYEOF'
          import re, sys, pathlib
          raw = pathlib.Path("vector_bench_raw.txt").read_text()
          # expect a line like: recall=0.95 build_sec=12.3
          recall_m = re.search(r"recall=([\d.]+)", raw)
          if not recall_m:
              print("No vector recall result found — skipping gate")
              sys.exit(0)
          recall = float(recall_m.group(1))
          if recall < 0.90:
              print(f"FAIL vector recall {recall:.3f} < 0.90 floor")
              sys.exit(1)
          print(f"PASS vector recall {recall:.3f} >= 0.90 floor")
          sys.exit(0)
          PYEOF

      - name: Upload benchmark results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: benchmark-results
          path: benchmark_results.json
          retention-days: 90

      - name: Stop pgrx PostgreSQL 18
        if: always()
        run: cargo pgrx stop pg18

name: Benchmark

on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  PGRX_VERSION: "0.17.0"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  benchmark:
    name: Performance baseline (pg18)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Cache cargo-pgrx binary
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin/cargo-pgrx
          key: ${{ runner.os }}-cargo-pgrx-${{ env.PGRX_VERSION }}

      - name: Cache pgrx PostgreSQL build
        uses: actions/cache@v5
        with:
          path: ~/.pgrx
          key: ${{ runner.os }}-pgrx-pg18-${{ env.PGRX_VERSION }}

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config libssl-dev libclang-dev clang \
            libreadline-dev libicu-dev bison flex

      - name: Install cargo-pgrx
        run: |
          if ! cargo pgrx --version 2>/dev/null | grep -q "${{ env.PGRX_VERSION }}"; then
            cargo install cargo-pgrx --version "=${{ env.PGRX_VERSION }}" --locked
          fi

      - name: Initialise pgrx (PostgreSQL 18)
        run: |
          if ! ls ~/.pgrx/18.*/pgrx-install/bin/pg_config 2>/dev/null | grep -q .; then
            cargo pgrx init --pg18 download
          fi

      - name: Clean stale pgrx data
        run: |
          cargo pgrx stop pg18 2>/dev/null || true
          rm -rf ~/.pgrx/data-18

      - name: Start pgrx PostgreSQL 18
        run: cargo pgrx start pg18 --postgresql-conf "allow_system_table_mods=on"

      - name: Build extension
        run: cargo pgrx install --pg-config ~/.pgrx/18.*/pgrx-install/bin/pg_config --release

      - name: Create extension in database
        run: |
          psql -h localhost -p 28818 -U "$USER" -d postgres -c "CREATE EXTENSION pg_ripple;"

      - name: Run benchmark
        run: |
          PGHOST=localhost PGPORT=28818 PGUSER="$USER" PGDATABASE=postgres \
            RESULT_FILE=benchmark_results.json \
            bash benchmarks/ci_benchmark.sh

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmark_results.json
          retention-days: 90

      - name: Stop pgrx PostgreSQL 18
        if: always()
        run: cargo pgrx stop pg18

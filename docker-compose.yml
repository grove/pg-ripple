# Docker Compose example for pg_ripple (batteries-included) with SPARQL Protocol HTTP endpoint.
#
# The batteries-included image pre-installs pg_ripple, PostGIS, and pgvector.
#
# Usage:
#   docker compose up -d
#   curl http://localhost:7878/health
#   # Load triples
#   psql -h localhost -U postgres -c "CREATE EXTENSION pg_ripple CASCADE;"
#   psql -h localhost -U postgres -c "SELECT pg_ripple.load_ntriples('<https://example.org/s> <https://example.org/p> <https://example.org/o> .');"
#   # SPARQL query
#   curl -G http://localhost:7878/sparql --data-urlencode "query=SELECT * WHERE { ?s ?p ?o } LIMIT 10"
#
# Optional extensions (available in batteries-included image):
#   psql -h localhost -U postgres -c "CREATE EXTENSION postgis;"   -- GeoSPARQL
#   psql -h localhost -U postgres -c "CREATE EXTENSION vector;"    -- vector search

services:
  postgres:
    build:
      context: .
      dockerfile: docker/Dockerfile.batteries
    image: ghcr.io/grove/pg_ripple:0.54.0
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: ripple
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  sparql:
    build:
      context: .
      dockerfile: docker/Dockerfile.batteries
    image: ghcr.io/grove/pg_ripple:0.54.0
    entrypoint: ["/usr/local/bin/pg_ripple_http"]
    ports:
      - "7878:7878"
    environment:
      PG_RIPPLE_HTTP_PG_URL: "postgresql://postgres:ripple@postgres/postgres"
      PG_RIPPLE_HTTP_PORT: "7878"
      PG_RIPPLE_HTTP_POOL_SIZE: "8"
      PG_RIPPLE_HTTP_CORS_ORIGINS: "*"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:

